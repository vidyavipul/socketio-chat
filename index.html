<!DOCTYPE html>
<html>
<head>
    <title>Socket.io Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; }
        #form { background: #eee; padding: 10px; display: flex; }
        #input { border: none; padding: 10px; flex-grow: 1; border-radius: 5px; }
        button { background: #333; color: white; border: none; padding: 10px 20px; margin-left: 10px; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io(); // Initialize connection

        var form = document.getElementById('form');
        var input = document.getElementById('input');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value) {
                // "Emit" the message to the server
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        // Listen for messages FROM the server
        socket.on('chat message', function(msg) {
            var item = document.createElement('li');
            item.textContent = msg;
            document.getElementById('messages').appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
