<!DOCTYPE html>
<html>
<head>
    <title>Socket.io Chat</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            height: 100vh; 
            margin: 0; 
            background: #f5f5f5;
        }
        
        #sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            padding: 15px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
        }
        
        #sidebar h3 {
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        
        #userList {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        #userList li {
            padding: 8px 10px;
            background: #34495e;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        
        #userList li::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        #chatContainer {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        #messages { 
            list-style-type: none; 
            margin: 0; 
            padding: 20px; 
            flex-grow: 1; 
            overflow-y: auto;
            background: white;
        }
        
        #messages li {
            margin-bottom: 10px;
            padding: 8px 12px;
            background: #ecf0f1;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        
        #messages li.notification {
            background: #e8f8f5;
            border-left-color: #2ecc71;
            font-style: italic;
            color: #27ae60;
        }
        
        #messages li.user-left {
            background: #fadbd8;
            border-left-color: #e74c3c;
            color: #c0392b;
        }
        
        #messages li strong {
            color: #2c3e50;
            margin-right: 8px;
        }
        
        #form { 
            background: #ecf0f1; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            border-top: 1px solid #bdc3c7;
        }
        
        #typingIndicator {
            font-size: 12px;
            color: #7f8c8d;
            min-height: 15px;
            font-style: italic;
            margin-bottom: 5px;
        }
        
        #inputContainer {
            display: flex;
        }
        
        #input { 
            border: 1px solid #bdc3c7; 
            padding: 10px; 
            flex-grow: 1; 
            border-radius: 5px 0 0 5px;
            font-size: 14px;
        }
        
        button { 
            background: #3498db; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            margin-left: 0;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Active Users (<span id="userCount">0</span>)</h3>
        <ul id="userList"></ul>
    </div>
    
    <div id="chatContainer">
        <ul id="messages"></ul>
        <form id="form" action="">
            <div id="typingIndicator"></div>
            <div id="inputContainer">
                <input id="input" autocomplete="off" placeholder="Type a message..." />
                <button>Send</button>
            </div>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        var socket = io();
        var form = document.getElementById('form');
        var input = document.getElementById('input');
        var messagesList = document.getElementById('messages');
        var userList = document.getElementById('userList');
        var userCount = document.getElementById('userCount');
        var typingIndicator = document.getElementById('typingIndicator');
        var currentUsername = '';
        var typingTimeout;

        // Prompt for username on connect
        function promptForUsername() {
            var username = prompt('Please enter your name:', '');
            if (username && username.trim() !== '') {
                currentUsername = username.trim();
                socket.emit('user join', currentUsername);
            } else {
                promptForUsername(); // Re-prompt if empty
            }
        }

        // Prompt for username when page loads
        window.addEventListener('load', promptForUsername);

        // Handle form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (input.value.trim()) {
                socket.emit('chat message', input.value);
                input.value = '';
                socket.emit('typing', false); // Stop typing indicator
            }
        });

        // Handle typing
        input.addEventListener('input', function() {
            if (input.value.trim()) {
                socket.emit('typing', true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(function() {
                    socket.emit('typing', false);
                }, 3000); // Stop typing after 3 seconds of inactivity
            }
        });

        // Listen for messages
        socket.on('chat message', function(data) {
            var item = document.createElement('li');
            item.innerHTML = '<strong>' + escapeHtml(data.username) + ':</strong> ' + escapeHtml(data.message);
            messagesList.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });

        // Listen for user join notification
        socket.on('user joined', function(msg) {
            var item = document.createElement('li');
            item.className = 'notification';
            item.textContent = '✓ ' + msg;
            messagesList.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });

        // Listen for user left notification
        socket.on('user left', function(msg) {
            var item = document.createElement('li');
            item.className = 'user-left';
            item.textContent = '✕ ' + msg;
            messagesList.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });

        // Update user list
        socket.on('update users', function(users) {
            userList.innerHTML = '';
            userCount.textContent = users.length;
            users.forEach(function(user) {
                var li = document.createElement('li');
                li.textContent = user.username;
                if (user.username === currentUsername) {
                    li.textContent += ' (You)';
                    li.style.background = '#3498db';
                }
                userList.appendChild(li);
            });
        });

        // Display typing indicator
        socket.on('user typing', function(data) {
            if (data.isTyping) {
                typingIndicator.textContent = data.username + ' is typing...';
            } else {
                typingIndicator.textContent = '';
            }
        });

        // Utility function to escape HTML
        function escapeHtml(text) {
            var map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }
    </script>
</body>
</html>
